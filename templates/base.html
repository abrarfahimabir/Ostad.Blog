<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Ostad Blog{% endblock %}</title>

    <!-- Favicon -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Bengali:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
      :root {
        --primary-color: #4f46e5;
        --primary-hover: #4338ca;
        --dark-bg: #0f172a;
        --text-light: #f8fafc;
        --danger-color: #ef4444;
      }

      /* Sticky Footer Logic */
      html, body {
        height: 100%;
        margin: 0;
      }

      body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        font-family: "Inter", "Noto Sans Bengali", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #f1f5f9;
        color: #1e293b;
      }

      .bangla, .bn-text {
        font-family: "Noto Sans Bengali", "Inter", system-ui, sans-serif;
        letter-spacing: 0.5px;
      }

      .content-wrapper {
        flex: 1 0 auto;
        display: flex;
        flex-direction: column;
      }
      main.container {
        flex: 1; 
      }

      /* Navbar Styling */
      .navbar {
        background-color: var(--dark-bg) !important;
        padding: 0.8rem 0;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }

      .navbar-brand {
        font-weight: 700;
        font-size: 1.4rem;
        color: var(--text-light) !important;
        display: flex;
        align-items: center;
      }

      .navbar-brand i { color: var(--primary-color); }

      .nav-link {
        color: #94a3b8 !important;
        font-weight: 500;
        padding: 0.5rem 1rem !important;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .nav-link:hover { color: var(--text-light) !important; transform: translateY(-1px); }

      /* Animated Hamburger */
      .navbar-toggler { border: none; padding: 0; box-shadow: none !important; }
      .hamburger { width: 30px; height: 20px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
      .hamburger span { display: block; height: 3px; width: 100%; background-color: var(--text-light); border-radius: 10px; transition: 0.3s; }
      .navbar-toggler:not(.collapsed) .hamburger span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
      .navbar-toggler:not(.collapsed) .hamburger span:nth-child(2) { opacity: 0; }
      .navbar-toggler:not(.collapsed) .hamburger span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

      .user-info {
        color: #cbd5e1;
        font-size: 0.95rem;
        background: rgba(255, 255, 255, 0.05);
        padding: 6px 14px;
        border-radius: 50px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
      }

      .user-info:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: translateY(-1px);
      }

      .dropdown-menu {
        background: var(--dark-bg);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        animation: slideDown 0.3s ease-out;
        margin-top: 8px;
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .dropdown-item {
        color: #94a3b8;
        padding: 12px 20px;
        transition: all 0.2s ease;
      }

      .dropdown-item:hover {
        background: rgba(255, 255, 255, 0.1);
        color: var(--text-light);
        transform: translateX(5px);
      }

      .btn-logout-dropdown {
        color: var(--danger-color) !important;
        font-weight: 600;
      }

      .btn-logout-dropdown:hover {
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger-color) !important;
      }

      /* Simple Modern Footer */
      .simple-footer {
        flex-shrink: 0;
        background: var(--dark-bg);
        padding: 25px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        text-align: center;
        color: #94a3b8;
      }

      .my-portfolio-link {
        color: #6366f1;
        text-decoration: none;
        font-weight: 700;
        transition: 0.3s;
        border-bottom: 2px solid transparent;
      }

      .my-portfolio-link:hover { color: #818cf8; border-bottom-color: #818cf8; }
      .fa-heart { color: #ef4444; }

      /* Go To Top Button - Liquid Glass */
      .go-top-btn {
        position: fixed;
        right: 20px;
        bottom: 20px;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 1px solid rgba(255,255,255,0.55);
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 8px 20px rgba(15,23,42,0.35);
        cursor: pointer;
        transition: transform 0.25s ease, opacity 0.25s ease;
        opacity: 0;
        visibility: hidden;
        z-index: 2000;
        display: grid;
        place-items: center;
      }

      .go-top-btn.visible {
        opacity: 1;
        visibility: visible;
      }

      .go-top-btn:hover {
        transform: translateY(-4px) scale(1.06);
      }

      .go-top-inner {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(220,230,255,0.35));
        border: 1px solid rgba(255,255,255,0.9);
        display: grid;
        place-items: center;
        position: relative;
        overflow: hidden;
      }

      @media (max-width: 767px) {
        .go-top-btn {
          width: 48px;
          height: 48px;
          right: 12px;
          bottom: 12px;
          box-shadow: 0 8px 16px rgba(15,23,42,0.3);
        }

        .go-top-inner {
          width: 36px;
          height: 36px;
        }

        .go-top-ring {
          width: 36px;
          height: 36px;
        }

        .go-top-percent {
          font-size: 0.72rem;
        }
      }

      .go-top-inner::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: rgba(79, 70, 229, 0.3);
        transform-origin: bottom center;
        transform: scaleY(var(--liquid-fill, 0));
        transition: transform 0.25s ease;
        pointer-events: none;
      }

      .go-top-inner .arrow {
        color: #1e293b;
        font-size: 1rem;
        position: relative;
        z-index: 1;
      }
    </style>
  </head>
  <body>

    <div class="content-wrapper">
      <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
          <a class="navbar-brand" href="{% url 'home' %}">
            <i class="fa-solid fa-feather-pointed me-2"></i>Ostad Blog
          </a>

          <button class="navbar-toggler collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <div class="hamburger">
              <span></span><span></span><span></span>
            </div>
          </button>

          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
              <li class="nav-item">
                <a class="nav-link" href="{% url 'home' %}"><i class="fa-solid fa-house"></i> Home</a>
              </li>

              {% if user.is_authenticated %}
                <li class="nav-item">
                  <a class="nav-link" href="{% url 'my_posts' %}"><i class="fa-solid fa-bookmark"></i> My Posts</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link btn-create ms-lg-2" href="{% url 'post_create' %}"><i class="fa-solid fa-plus"></i> Create Post</a>
                </li>
                <li class="nav-item ms-lg-3">
                  <div class="dropdown">
                    <span class="user-info d-flex align-items-center gap-2 dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                      <i class="fa-solid fa-circle-user text-primary"></i> {{ user.username }}
                    </span>
                    <ul class="dropdown-menu">
                      <li><a class="dropdown-item" href="{% url 'profile' %}"><i class="fa-solid fa-user me-2"></i> Profile</a></li>
                      <li>
                        <form action="{% url 'logout' %}" method="post" class="m-0">
                          {% csrf_token %}
                          <button type="submit" class="dropdown-item btn-logout-dropdown">
                            <i class="fa-solid fa-arrow-right-from-bracket me-2"></i> Logout
                          </button>
                        </form>
                      </li>
                    </ul>
                  </div>
                </li>
              {% else %}
                <li class="nav-item">
                  <a class="nav-link" href="{% url 'login' %}"><i class="fa-solid fa-arrow-right-to-bracket"></i> Login</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="{% url 'register' %}"><i class="fa-solid fa-user-plus"></i> Register</a>
                </li>
              {% endif %}
            </ul>
          </div>
        </div>
      </nav>
      <main class="container py-5">
        {% block content %} {% endblock %}
      </main>
    </div>

    <footer class="simple-footer">
      <div class="container">
        <div class="mb-1">
          Developed by 
          <a href="http://www.abrarfahim.xyz" target="_blank" class="my-portfolio-link">Abrar Fahim</a>
        </div>
        <div class="small opacity-50">
          &copy; <span id="year"></span> All Rights Reserved.
        </div>
      </div>
    </footer>
    <button class="go-top-btn" id="goTopBtn" aria-label="Go to top">
      <div class="go-top-inner" id="goTopInner">
        <i class="fa-solid fa-angle-up arrow"></i>
      </div>
    </button><script>
    const triggerDelete = (formId) => {
        Swal.fire({
            title: 'Are you sure?',
            text: "You won't be able to revert this!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Yes, delete it!',
            cancelButtonText: 'Cancel',
            reverseButtons: true,
            // Responsive Settings
            width: window.innerWidth < 480 ? '90%' : '450px', 
            padding: '1.5rem',
            customClass: {
                popup: 'rounded-4 shadow-lg border-0',
                title: 'fs-4 fw-bold text-dark',
                confirmButton: 'px-4 py-2 rounded-3',
                cancelButton: 'px-4 py-2 rounded-3'
            },
            showClass: {
                popup: 'animate__animated animate__zoomIn animate__faster'
            },
            hideClass: {
                popup: 'animate__animated animate__fadeOut animate__faster'
            }
        }).then((result) => {
            if (result.isConfirmed) {
                document.getElementById(formId).submit();
            }
        });
    }

    // Post Detail পেজের জন্য কল
    document.querySelector('.detail-delete-btn')?.addEventListener('click', function() {
        triggerDelete('delete-form-detail');
    });

    // My Posts (Dashboard) পেজের জন্য কল
    document.querySelectorAll('.delete-btn').forEach(button => {
        button.addEventListener('click', function() {
            const postId = this.getAttribute('data-id');
            triggerDelete('delete-form-' + postId);
        });
    });
</script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
      // Automatic Year Update
      document.getElementById("year").textContent = new Date().getFullYear();

      const goTopBtn = document.getElementById('goTopBtn');
      const goTopInner = document.getElementById('goTopInner');
      const scrollThreshold = 240;

      window.addEventListener('scroll', function() {
        const scrollY = window.scrollY || window.pageYOffset;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        const progress = docHeight > 0 ? Math.min(1, scrollY / docHeight) : 0;

        if (scrollY > scrollThreshold) {
          goTopBtn.classList.add('visible');
        } else {
          goTopBtn.classList.remove('visible');
        }

        const scale = 1 + progress * 0.45;
        goTopInner.style.transform = `scale(${scale})`;
        goTopInner.style.boxShadow = `0 0 18px rgba(79, 70, 229, ${0.25 + progress * 0.6})`;
        goTopInner.style.setProperty('--liquid-fill', progress);

        const arrow = goTopInner.querySelector('.arrow');
        arrow.style.opacity = `${0.4 + progress * 0.6}`;
        arrow.style.filter = `drop-shadow(0 0 5px rgba(0,0,0,${0.15 + progress * 0.2}))`;
      });

      goTopBtn.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>
