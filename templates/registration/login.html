{% extends 'base.html' %}

{% block title %}Sign In | Interactive Blog{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.9);
        --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
    }

    .login-section {
        min-height: 65vh;
        display: flex;
        align-items: center;
        justify-content: center;
        perspective: 1000px;
    }

    /* Glass Card Style */
    .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 2rem;
        padding: 1.5rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        transition: all 0.5s ease;
    }

    .glass-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 30px 60px -12px rgba(99, 102, 241, 0.2);
    }

    /* Icon Animation */
    .login-icon-box {
        width: 80px;
        height: 80px;
        background: var(--accent-gradient);
        border-radius: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 0.2rem;
        color: white;
        font-size: 2rem;
        box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    /* Form Design */
    .form-group-custom {
        margin-bottom: 0.2rem;
        position: relative;
    }

    .login-body label {
        font-weight: 600;
        color: #4b5563;
        font-size: 0.85rem;
        margin-left: 5px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .login-body input {
        border: 2px solid #f3f4f6;
        background: #f9fafb;
        border-radius: 1rem;
        padding: 0.5rem 0.5rem;
        transition: all 0.3s ease;
        font-size: 1rem;
    }

    .login-body .password-field-wrapper {
        position: relative;
    }

    .login-body .toggle-password {
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        border: none;
        background: transparent;
        color: #64748b;
        font-size: 1rem;
        cursor: pointer;
        padding: 0.2rem;
    }

    .login-body input:focus {
        border-color: #6366f1;
        background: white;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        transform: scale(1.02);
    }

    /* Animated Button */
    .btn-animated {
        background: var(--accent-gradient);
        border: none;
        color: white;
        padding: 1rem;
        border-radius: 1rem;
        font-weight: 700;
        letter-spacing: 1px;
        position: relative;
        overflow: hidden;
        z-index: 1;
        transition: 0.4s;
    }

    .btn-animated::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        transition: 0.5s;
        z-index: -1;
    }

    .btn-animated:hover::before {
        left: 100%;
    }

    .btn-animated:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
    }

    /* Links */
    .auth-footer a {
        color: #6366f1;
        text-decoration: none;
        font-weight: 700;
        position: relative;
    }

    .auth-footer a::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 2px;
        background: #6366f1;
        transition: 0.3s;
    }

    .auth-footer a:hover::after {
        width: 100%;
    }
</style>

<div class="login-section">
    <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4 px-3">
        <div class="glass-card animate__animated animate__zoomIn">
            <div class="login-icon-box">
                <i class="fa-solid fa-lock"></i>
            </div>
            
            <div class="text-center mb-5">
                <h2 class="fw-bold text-dark">Welcome Back</h2>
                <p class="text-muted">Enter your credentials to continue</p>
            </div>

            <div class="login-body">
                <form method="post" id="loginForm">
                    {% csrf_token %}
                    
                    <div class="animate__animated animate__fadeInUp animate__delay-1s">
                        {{ form.as_p }}
                    </div>
                    
                    <button type="submit" class="btn btn-animated w-100 mt-4 animate__animated animate__fadeInUp animate__delay-2s">
                        SIGN IN <i class="fa-solid fa-arrow-right-long ms-2"></i>
                    </button>
                </form>

                <div class="auth-footer text-center mt-5 animate__animated animate__fadeIn animate__delay-3s">
                    <p class="text-muted">New here? <a href="{% url 'register' %}">Create Account</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Django Form Cleanup & Animation Trigger
    document.addEventListener("DOMContentLoaded", function() {
        const inputs = document.querySelectorAll('.login-body input');
        inputs.forEach((input, index) => {
            input.classList.add('form-control');
            input.placeholder = "Enter your " + input.name;
            input.parentElement.style.animationDelay = (index * 0.2) + 's';
        });

        const passwordFields = document.querySelectorAll('.login-body input[type="password"]');

        passwordFields.forEach(field => {
            const wrapper = document.createElement('div');
            wrapper.classList.add('password-field-wrapper');

            field.parentNode.insertBefore(wrapper, field);
            wrapper.appendChild(field);

            const toggle = document.createElement('button');
            toggle.type = 'button';
            toggle.className = 'toggle-password';
            toggle.setAttribute('aria-label', 'Show/Hide password');
            toggle.innerHTML = '<i class="fa-solid fa-eye"></i>';

            toggle.addEventListener('click', function(e) {
                e.preventDefault();
                if (field.type === 'password') {
                    field.type = 'text';
                    toggle.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
                } else {
                    field.type = 'password';
                    toggle.innerHTML = '<i class="fa-solid fa-eye"></i>';
                }
            });

            wrapper.appendChild(toggle);
        });
    });
</script>
{% endblock %}
